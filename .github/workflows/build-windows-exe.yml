name: Build Windows Exe

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build Windows exe
        run: |
          python build_exe.py

      - name: Create distribution artifacts
        run: |
          mkdir -p dist/artifacts
          Copy-Item -Path dist -Destination dist/artifacts -Recurse
          Get-ChildItem -Path dist/artifacts

      - name: Upload artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/pdf-tool/**
          body_path: .github/release-notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-build-${{ matrix.python-version }}
          path: dist/
          retention-days: 30

      - name: Create GitHub release note
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Windows exe successfully built for pdf-tool"
          echo "Build completed at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          echo "Python Version: ${{ matrix.python-version }}"
