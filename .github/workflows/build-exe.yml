name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build CLI EXE
        run: uv run python build_exe.py --mode cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-tool-cli-windows
          path: dist/pdf-tool.exe

  build-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra build --extra gui

      - name: Build GUI EXE
        run: uv run python build_exe.py --mode gui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-tool-gui-windows
          path: dist/pdf-tool-gui.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: pdf-tool-cli-windows
          path: dist/

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: pdf-tool-gui-windows
          path: dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pdf-tool.exe
            dist/pdf-tool-gui.exe
